name: Continuous Deployment

on:
  push:
    branches:
      - main # تأكد إن ده اسم البرانش بتاعك

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting Deployment..."

            # الدخول للمسار الصحيح
            cd /var/www/coddymaster.com || { echo "❌ Directory not found"; exit 1; }

            # جلب التحديثات وإجبار السيرفر على التطابق مع GitHub
            echo "📥 Pulling latest changes from GitHub..."
            git fetch --all
            git reset --hard origin/main

            # ضبط الصلاحيات للتأكد من أن الصور والأيقونات تظهر
            echo "🔐 Setting permissions..."
            chown -R www-data:www-data /var/www/coddymaster.com
            chmod -R 755 /var/www/coddymaster.com

            # إعادة تشغيل Nginx لضمان تحديث الكاش
            echo "🔄 Restarting Nginx..."
            systemctl restart nginx

            echo "✅ Deployment Successful!"
